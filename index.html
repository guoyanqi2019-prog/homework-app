<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6C5CE7">
<title>⭐ 作业本</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5fa; min-height: 100vh; color: #333; }

header { background: linear-gradient(135deg, #6C5CE7, #A29BFE); padding: 16px 20px; color: white; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
header .left { display: flex; flex-direction: column; }
header h1 { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
header p { font-size: 0.85rem; opacity: 0.9; margin-top: 4px; }
header .settings { background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }

.date-bar { background: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
.date-bar .date { font-weight: 700; color: #6C5CE7; }
.date-bar .nav { display: flex; gap: 8px; }
.date-bar button { background: #6C5CE7; color: white; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }

.sync-bar { background: #f0f7ff; padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #6C5CE7; border-bottom: 1px solid #e0eeff; }
.sync-bar .status { display: flex; align-items: center; gap: 6px; }
.sync-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
.sync-bar .dot.active { background: #00B894; }
.sync-bar button { background: #6C5CE7; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; }

.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px 20px; }
.stats .card { background: white; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.stats .num { font-size: 2rem; font-weight: 800; color: #6C5CE7; }
.stats .label { font-size: 0.75rem; color: #888; margin-top: 4px; }

.list { padding: 0 20px 100px; }
.list h3 { font-size: 0.9rem; color: #888; margin: 20px 0 12px; display: flex; align-items: center; gap: 6px; }
.list h3::after { content: ''; flex: 1; height: 1px; background: #eee; }

.hw-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; align-items: flex-start; gap: 12px; }
.hw-card.done { opacity: 0.6; }
.hw-card .check { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; transition: all 0.2s; }
.hw-card .check.checked { background: #00B894; border-color: #00B894; color: white; }
.hw-card .info { flex: 1; }
.hw-card .title { font-weight: 600; font-size: 1rem; }
.hw-card.done .title { text-decoration: line-through; color: #888; }
.hw-card .meta { font-size: 0.8rem; color: #888; margin-top: 4px; }
.hw-card .type { display: inline-block; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-right: 6px; }
.hw-card .type.school { background: rgba(108,92,231,0.1); color: #6C5CE7; }
.hw-card .type.extra { background: rgba(0,206,201,0.1); color: #00B894; }
.hw-card .del { background: none; border: none; color: #ff6b6b; font-size: 1.2rem; cursor: pointer; padding: 4px; }

.empty { text-align: center; padding: 60px 20px; color: #ccc; }
.empty .icon { font-size: 4rem; margin-bottom: 12px; }
.empty p { font-size: 0.9rem; }

.add-btn { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #6C5CE7, #A29BFE); color: white; border: none; font-size: 2rem; box-shadow: 0 4px 20px rgba(108,92,231,0.4); cursor: pointer; z-index: 100; }

.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.modal.open { display: flex; }
.modal-content { background: white; width: 100%; max-height: 90vh; border-radius: 24px 24px 0 0; padding: 24px; overflow-y: auto; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-content h2 { font-size: 1.2rem; margin-bottom: 20px; text-align: center; }
.modal-content .form { margin-bottom: 16px; }
.modal-content label { display: block; font-size: 0.85rem; color: #888; margin-bottom: 6px; }
.modal-content input, .modal-content select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 1rem; outline: none; }
.modal-content input:focus { border-color: #6C5CE7; }
.modal-content .btn-row { display: flex; gap: 12px; margin-top: 20px; }
.modal-content button { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
.modal-content .btn-cancel { background: #eee; color: #666; }
.modal-content .btn-save { background: #6C5CE7; color: white; }
.modal-content .btn-danger { background: #ff6b6b; color: white; }
.modal-content .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
.modal-content .toggle-row:last-child { border-bottom: none; }
.modal-content .toggle { width: 50px; height: 28px; border-radius: 14px; background: #ddd; position: relative; cursor: pointer; transition: all 0.2s; }
.modal-content .toggle.active { background: #00B894; }
.modal-content .toggle::after { content: ''; position: absolute; width: 24px; height: 24px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: all 0.2s; }
.modal-content .toggle.active::after { left: 24px; }
.modal-content .info-text { font-size: 0.8rem; color: #888; margin-top: 8px; line-height: 1.5; }

.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: white; padding: 12px 24px; border-radius: 50px; font-size: 0.9rem; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 300; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="left">
    <h1>⭐ 作业本</h1>
    <p id="dateStr"></p>
  </div>
  <button class="settings" onclick="openSettings()">⚙️</button>
</header>

<div class="sync-bar">
  <div class="status">
    <div class="dot" id="syncDot"></div>
    <span id="syncStatus">未同步</span>
  </div>
  <button onclick="syncNow()">🔄 同步</button>
</div>

<div class="date-bar">
  <span class="date" id="viewDateLabel">今日</span>
  <div class="nav">
    <button onclick="navigateDay(-1)">‹</button>
    <button onclick="navigateDay(1)">›</button>
  </div>
</div>

<div class="stats">
  <div class="card">
    <div class="num" id="statTotal">0</div>
    <div class="label">总作业</div>
  </div>
  <div class="card">
    <div class="num" id="statDone">0</div>
    <div class="label">已完成</div>
  </div>
  <div class="card">
    <div class="num" id="statLeft">0</div>
    <div class="label">待完成</div>
  </div>
</div>

<div class="list">
  <h3>🏫 学校作业</h3>
  <div id="schoolList"></div>
  
  <h3>🎨 课外班</h3>
  <div id="extraList"></div>
</div>

<button class="add-btn" onclick="openAdd()">+</button>

<!-- Add Modal -->
<div class="modal" id="addModal">
  <div class="modal-content">
    <h2>➕ 添加作业</h2>
    <div class="form">
      <label>类型</label>
      <select id="hwType">
        <option value="school">🏫 学校作业</option>
        <option value="extra">🎨 课外班</option>
      </select>
    </div>
    <div class="form">
      <label>科目/课程</label>
      <input type="text" id="hwSubject" placeholder="如：数学、英语、钢琴">
    </div>
    <div class="form">
      <label>作业内容 *</label>
      <input type="text" id="hwTitle" placeholder="简短描述作业">
    </div>
    <div class="form">
      <label>截止日期</label>
      <input type="date" id="hwDate">
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeAdd()">取消</button>
      <button class="btn-save" onclick="saveHw()">保存</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal" id="settingsModal">
  <div class="modal-content">
    <h2>⚙️ 同步设置</h2>
    
    <div class="toggle-row">
      <span>自动同步</span>
      <div class="toggle" id="autoSyncToggle" onclick="toggleAutoSync()"></div>
    </div>
    
    <div class="form" style="margin-top: 20px;">
      <label>Gist ID</label>
      <input type="text" id="gistId" placeholder="粘贴 Gist ID">
    </div>
    
    <div class="form">
      <label>GitHub Token</label>
      <input type="password" id="gistToken" placeholder="ghp_xxxx...">
    </div>
    
    <p class="info-text">Token 只需 gist 权限。<a href="https://github.com/settings/tokens" target="_blank" style="color:#6C5CE7">获取 Token →</a><br>
    老师创建一个 Gist，学生配置后自动同步作业。</p>
    
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeSettings()">关闭</button>
      <button class="btn-save" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var DB_KEY = 'homework_db_v1';
var GIST_ID_KEY = 'hw_gist_id';
var GIST_TOKEN_KEY = 'hw_gist_token';
var AUTO_SYNC_KEY = 'hw_auto_sync';
var viewDate = today();
var autoSyncTimer = null;

function today() { return new Date().toISOString().slice(0,10); }

function load() {
  try { return JSON.parse(localStorage.getItem(DB_KEY) || '{"homeworks":[],"checkins":{}}'); }
  catch (e) { return { homeworks: [], checkins: {} }; }
}

function save(data) { 
  localStorage.setItem(DB_KEY, JSON.stringify(data));
  gistPush();
}

function getGistId() { return localStorage.getItem(GIST_ID_KEY) || ''; }
function getGistToken() { return localStorage.getItem(GIST_TOKEN_KEY) || ''; }

function navigateDay(delta) {
  var d = new Date(viewDate);
  d.setDate(d.getDate() + delta);
  viewDate = d.toISOString().slice(0,10);
  render();
}

function getDateLabel(ds) {
  if (ds === today()) return '今日';
  var yesterday = new Date();
  yesterday.setDate(yesterday.getDate()-1);
  if (ds === yesterday.toISOString().slice(0,10)) return '昨日';
  return (new Date(ds).getMonth()+1) + '月' + new Date(ds).getDate() + '日';
}

function render() {
  var db = load();
  
  document.getElementById('dateStr').textContent = new Date().toLocaleDateString('zh-CN', {weekday:'long', month:'long', day:'numeric'});
  document.getElementById('viewDateLabel').textContent = getDateLabel(viewDate);
  document.getElementById('hwDate').value = viewDate;
  
  var hws = db.homeworks.filter(function(h) { return !h.deleted && h.dueDate === viewDate; });
  var school = hws.filter(function(h) { return h.type === 'school'; });
  var extra = hws.filter(function(h) { return h.type === 'extra'; });
  var checkin = db.checkins[viewDate] || {};
  
  var doneCount = hws.filter(function(h) { return checkin[h.id]; }).length;
  document.getElementById('statTotal').textContent = hws.length;
  document.getElementById('statDone').textContent = doneCount;
  document.getElementById('statLeft').textContent = hws.length - doneCount;
  
  var htmlSchool = school.length ? school.map(function(h) { return hwCard(h, checkin[h.id]); }).join('') : '<div class="empty"><div class="icon">📚</div><p>暂无学校作业</p></div>';
  var htmlExtra = extra.length ? extra.map(function(h) { return hwCard(h, checkin[h.id]); }).join('') : '<div class="empty"><div class="icon">🎹</div><p>暂无课外班作业</p></div>';
  
  document.getElementById('schoolList').innerHTML = htmlSchool;
  document.getElementById('extraList').innerHTML = htmlExtra;
}

function hwCard(hw, done) {
  var checkHtml = done ? '<span style="color:white">✓</span>' : '';
  var doneClass = done ? 'done' : '';
  return '<div class="hw-card ' + doneClass + '">' +
    '<div class="check ' + (done ? 'checked' : '') + '" onclick="toggleCheck(\'' + hw.id + '\')">' + checkHtml + '</div>' +
    '<div class="info">' +
      '<div class="title">' + hw.title + '</div>' +
      '<div class="meta"><span class="type ' + hw.type + '">' + (hw.type === 'school' ? '🏫' : '🎨') + '</span>' + (hw.subject || '') + '</div>' +
    '</div>' +
    '<button class="del" onclick="delHw(\'' + hw.id + '\')">×</button>' +
  '</div>';
}

function toggleCheck(id) {
  var db = load();
  if (!db.checkins[viewDate]) db.checkins[viewDate] = {};
  if (db.checkins[viewDate][id]) {
    delete db.checkins[viewDate][id];
  } else {
    db.checkins[viewDate][id] = true;
  }
  save(db);
  render();
  gistPush();
}

function delHw(id) {
  if (!confirm('确定删除？')) return;
  var db = load();
  var hw = db.homeworks.find(function(h) { return h.id === id; });
  if (hw) hw.deleted = true;
  save(db);
  render();
  toast('已删除');
}

function openAdd() {
  document.getElementById('hwType').value = 'school';
  document.getElementById('hwSubject').value = '';
  document.getElementById('hwTitle').value = '';
  document.getElementById('hwDate').value = viewDate;
  document.getElementById('addModal').classList.add('open');
}

function closeAdd() {
  document.getElementById('addModal').classList.remove('open');
}

function saveHw() {
  var title = document.getElementById('hwTitle').value.trim();
  if (!title) { toast('请输入作业内容'); return; }
  
  var db = load();
  db.homeworks.push({
    id: Date.now().toString(),
    type: document.getElementById('hwType').value,
    subject: document.getElementById('hwSubject').value.trim(),
    title: title,
    dueDate: document.getElementById('hwDate').value,
    createdAt: today()
  });
  save(db);
  closeAdd();
  render();
  toast('已保存');
}

function openSettings() {
  document.getElementById('gistId').value = getGistId();
  document.getElementById('gistToken').value = getGistToken();
  var autoSync = localStorage.getItem(AUTO_SYNC_KEY) === 'true';
  document.getElementById('autoSyncToggle').className = 'toggle' + (autoSync ? ' active' : '');
  document.getElementById('settingsModal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}

function toggleAutoSync() {
  var toggle = document.getElementById('autoSyncToggle');
  var isActive = toggle.classList.contains('active');
  toggle.classList.toggle('active');
  localStorage.setItem(AUTO_SYNC_KEY, !isActive);
  
  if (!isActive) {
    startAutoSync();
  } else {
    stopAutoSync();
  }
}

function saveSettings() {
  localStorage.setItem(GIST_ID_KEY, document.getElementById('gistId').value.trim());
  localStorage.setItem(GIST_TOKEN_KEY, document.getElementById('gistToken').value.trim());
  closeSettings();
  toast('设置已保存');
  
  if (localStorage.getItem(AUTO_SYNC_KEY) === 'true') {
    startAutoSync();
  }
  syncNow();
}

function startAutoSync() {
  if (autoSyncTimer) clearInterval(autoSyncTimer);
  autoSyncTimer = setInterval(syncNow, 60000);
  document.getElementById('syncDot').classList.add('active');
  document.getElementById('syncStatus').textContent = '自动同步中';
}

function stopAutoSync() {
  if (autoSyncTimer) {
    clearInterval(autoSyncTimer);
    autoSyncTimer = null;
  }
}

async function syncNow() {
  var gistId = getGistId();
  var token = getGistToken();
  
  if (!gistId || !token) {
    document.getElementById('syncStatus').textContent = '未配置';
    return;
  }
  
  document.getElementById('syncStatus').textContent = '同步中...';
  
  try {
    var res = await fetch('https://api.github.com/gists/' + gistId, {
      headers: { 'Authorization': 'token ' + token }
    });
    
    if (!res.ok) throw new Error('获取失败');
    
    var data = await res.json();
    var file = data.files && data.files['homework.json'];
    
    if (file) {
      var remote = JSON.parse(file.content);
      var db = load();
      
      remote.forEach(function(r) {
        if (!r.id) return;
        var exists = db.homeworks.find(function(h) { return h.id === r.id; });
        if (!exists) {
          db.homeworks.push(r);
        } else {
          Object.assign(exists, r);
        }
      });
      
      save(db);
      render();
    }
    
    await gistPush();
    
    document.getElementById('syncDot').classList.add('active');
    document.getElementById('syncStatus').textContent = '已同步';
  } catch (e) {
    document.getElementById('syncStatus').textContent = '同步失败';
    console.error(e);
  }
}

async function gistPush() {
  var gistId = getGistId();
  var token = getGistToken();
  
  if (!gistId || !token) return;
  
  try {
    var db = load();
    var hws = db.homeworks.filter(function(h) { return !h.deleted; });
    var content = JSON.stringify({ homeworks: hws, checkins: db.checkins }, null, 2);
    
    await fetch('https://api.github.com/gists/' + gistId, {
      method: 'PATCH',
      headers: {
        'Authorization': 'token ' + token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        files: {
          'homework.json': { content: content }
        }
      })
    });
  } catch (e) {
    console.error('Push failed:', e);
  }
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

document.getElementById('addModal').addEventListener('click', function(e) {
  if (e.target === this) closeAdd();
});

document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

render();

if (localStorage.getItem(AUTO_SYNC_KEY) === 'true' && getGistId()) {
  startAutoSync();
  syncNow();
}
</script>
</body>
</html>
